name: Feature Request
description: Suggest a new skill or improvement to an existing one
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - New skill
        - Improvement to existing skill
        - Other
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Skill name
      description: Name of existing skill, or proposed name for a new one
      placeholder: e.g. review, my-new-skill
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What should this skill do? What problem does it solve?
    validations:
      required: true
