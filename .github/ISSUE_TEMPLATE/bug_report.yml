name: Bug Report
description: Report an issue with a skill
labels: ["bug"]
body:
  - type: input
    id: skill
    attributes:
      label: Skill name
      placeholder: e.g. commit, review, orch
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment
      description: Claude Code version, OS, any relevant details
      placeholder: |
        - Claude Code version:
        - OS:
